function mostrarCartaz(){

    let sala = salas[salaAtual];

    if(sala.filmes.length==0){

        alert("Nenhum filme cadastrado.");

        return;

    }

    let html = `
    <div style="
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:30px;
    ">

        <h1 style="
        text-align:center;
        margin-bottom:40px;
        ">
        🎬 ${salaAtual}
        </h1>

        <div style="
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
        gap:30px;
        ">
    `;

    sala.filmes.forEach(function(filme,indice){

        html += `

        <div style="
        background:#1e293b;
        border-radius:15px;
        padding:15px;
        text-align:center;
        ">

            <img
            src="${filme.imagem}"
            style="

            border-radius:10px;
            margin-bottom:15px;
            ">

            <h3>${filme.nome}</h3>

            <button
            style="

            width:100%;
            "
            onclick="selecionarFilme(${indice})">

            ▶ ASSISTIR

            </button>

        </div>

        `;

    });

    html += `
        </div>
    </div>
    `;

    document.body.innerHTML = html;

}

function verificarCodigo(){

}

function carregarConteudo(indice){


let sala =
salas[salaAtual];


let menu =
document.getElementById("menuConteudo");


let html="";
if(indice!=null){

    assistir(sala.filmes[indice].url);

}


// FILMES


if(sala.filmes.length>0){


html += `

<h3 style="margin-bottom:10px;">
🍿 Filmes
</h3>

`;


sala.filmes.forEach(function(filme){


html += `


<div 
onclick="assistir('${filme.url}')"
style="
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
">


🎬 ${filme.nome}


</div>


`;


});


}





// SÉRIES


if(sala.series.length>0){


html += `

<h3 style="margin-top:20px;">
📺 Séries
</h3>

`;



sala.series.forEach(function(serie,index){


html += `


<div
onclick="mostrarEpisodios(${index})"
style="
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
">

📺 ${serie.nome}

</div>


`;


});


}




if(html===""){


html=`

<p style="margin-top:20px;">
Nenhum conteúdo cadastrado nesta sala.
</p>

`;


}



menu.innerHTML=html;



}




// ===============================

let menu =

let html=`

${serie.nome}

`;


serie.episodios.forEach(function(ep){



html += `


<div
onclick="assistir('${ep.url}')"
style="
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
">

▶ ${ep.nome}

</div>


`;



});



menu.innerHTML=html;



}

  padding: 14px 20px;

  font-weight: bold;

  cursor: pointer;

  display: none;

  transition: all .3s ease;
}

#btnInstall:hover {
  transform: scale(1.05);
}
</style>

<button id="btnInstall">📲 Instalar App</button>

<script>
let deferredPrompt;

const btnInstall = document.getElementById("btnInstall");

// Verifica se já está instalado
function isAppInstalled() {
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
}

// Se não estiver instalado
if (!isAppInstalled()) {

  window.addEventListener("beforeinstallprompt", (e) => {

    e.preventDefault();

    deferredPrompt = e;

    btnInstall.style.display = "block";
  });

}

// Clique no botão
btnInstall.addEventListener("click", async () => {

  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  const { outcome } = await deferredPrompt.userChoice;

  console.log("Resultado:", outcome);

  deferredPrompt = null;

  btnInstall.style.display = "none";
});

// Quando instalar
window.addEventListener("appinstalled", () => {

  console.log("PWA instalado");

  btnInstall.style.display = "none";
});

// Registrar Service Worker
if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("./service-worker.js")
    .then(() => console.log("SW registrado"))
    .catch((err) => console.log("Erro SW:", err));

}
</script>
