// ===============================
// CONFERIR O CÓDIGO DA SALA
// ===============================


function verificarCodigo(){


let digitado =
document.getElementById("codigoDigitado").value;



let sala =
salas[salaAtual];



if(sala && digitado===sala.codigo){

.style.display="none";

.style.display="none";

}

.innerHTML="Código incorreto.";

function abrirCinema(){


document.body.innerHTML += `

<div style="
width:280px;
background:#111827;
padding:20px;

// ===============================
// MOSTRAR FILMES E SÉRIES
// ===============================


function carregarConteudo(){


let sala =
salas[salaAtual];


let menu =
document.getElementById("menuConteudo");


let html="";



// FILMES


if(sala.filmes.length>0){


html += `

<h3 style="margin-bottom:10px;">
🍿 Filmes
</h3>

`;


sala.filmes.forEach(function(filme){


html += `


<div 
onclick="assistir('${filme.url}')"
style="
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
">


🎬 ${filme.nome}


</div>


`;


});


}





// SÉRIES


if(sala.series.length>0){


html += `

<h3 style="margin-top:20px;">
📺 Séries
</h3>

`;



sala.series.forEach(function(serie,index){


html += `


<div
onclick="mostrarEpisodios(${index})"
style="
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
">

📺 ${serie.nome}

</div>


`;


});


}




if(html===""){


html=`

<p style="margin-top:20px;">
Nenhum conteúdo cadastrado nesta sala.
</p>

`;


}



menu.innerHTML=html;



}




// ===============================
// EPISÓDIOS DAS SÉRIES
// ===============================


function mostrarEpisodios(indice){


let sala =
salas[salaAtual];


let serie =
sala.series[indice];


let menu =
document.getElementById("menuConteudo");



let html=`


<h3>
${serie.nome}
</h3>


`;


serie.episodios.forEach(function(ep){



html += `


<div
onclick="assistir('${ep.url}')"
style="
background:#1e293b;
padding:15px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
">

▶ ${ep.nome}

</div>


`;



});



menu.innerHTML=html;



}

.src=url;


}

<style>
#btnInstall {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;

  border: none;
  border-radius: 50px;
  padding: 14px 20px;

  background: #000;
  color: #fff;

  font-size: 16px;
  font-weight: bold;

  box-shadow: 0 4px 12px rgba(0,0,0,.3);

  cursor: pointer;

  display: none;

  transition: all .3s ease;
}

#btnInstall:hover {
  transform: scale(1.05);
}
</style>

<button id="btnInstall">📲 Instalar App</button>

<script>
let deferredPrompt;

const btnInstall = document.getElementById("btnInstall");

// Verifica se já está instalado
function isAppInstalled() {
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
}

// Se não estiver instalado
if (!isAppInstalled()) {

  window.addEventListener("beforeinstallprompt", (e) => {

    e.preventDefault();

    deferredPrompt = e;

    btnInstall.style.display = "block";
  });

}

// Clique no botão
btnInstall.addEventListener("click", async () => {

  if (!deferredPrompt) return;

  deferredPrompt.prompt();

  const { outcome } = await deferredPrompt.userChoice;

  console.log("Resultado:", outcome);

  deferredPrompt = null;

  btnInstall.style.display = "none";
});

// Quando instalar
window.addEventListener("appinstalled", () => {

  console.log("PWA instalado");

  btnInstall.style.display = "none";
});

// Registrar Service Worker
if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("./service-worker.js")
    .then(() => console.log("SW registrado"))
    .catch((err) => console.log("Erro SW:", err));

}
</script>
